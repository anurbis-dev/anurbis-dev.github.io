# Rebuild media/manifest.json from folder contents whenever media assets change.
# Static Pages cannot list directories — the manifest is the file index for carousels.
name: Media manifest

on:
  push:
    branches: [main]
    paths:
      - "media/**"
      - "scripts/generate-media-manifest.mjs"
      - ".github/workflows/media-manifest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifest
        run: node scripts/generate-media-manifest.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add media/manifest.json
          if git diff --staged --quiet; then
            echo "No manifest changes"
            exit 0
          fi
          git commit -m "chore: regenerate media/manifest.json"
          git push
